<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Bakery - Artisan Excellence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    :root {
      --gold: #C9A84C;
      --cream: #FAF5EB;
      --charcoal: #1A1612;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Jost', sans-serif;
    }

    body, html { 
      margin: 0; padding: 0; 
      background: var(--charcoal); 
      color: var(--cream);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    /* Hero Section */
    #hero {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 10vw, 8rem);
      margin: 0;
      line-height: 0.8;
      opacity: 0;
    }

    .hero-title em { color: var(--gold); font-style: italic; }

    .nav-cta {
      margin-top: 2rem;
      padding: 1rem 2rem;
      background: var(--gold);
      color: var(--charcoal);
      border: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
      z-index: 20;
    }
  </style>
</head>
<body>

  <section id="hero">
    <div class="hero-content">
        <span style="color:var(--gold); letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem;">Est. 2024</span>
        <h1 class="hero-title">Royal <em>Bakery</em></h1>
        <p style="letter-spacing: 3px; opacity: 0.8;">ARTISAN EXCELLENCE</p>
        <button class="nav-cta">Explore Menu</button>
    </div>
  </section>

  <script>
    // --- THREE.JS ENGINE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('hero').appendChild(renderer.domElement);

    // Create a "Floating Gold Grain" (Torus)
    const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
    const material = new THREE.MeshStandardMaterial({ 
        color: 0xC9A84C, 
        metalness: 0.9, 
        roughness: 0.1 
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // Lighting
    const pointLight = new THREE.PointLight(0xffffff, 100);
    pointLight.position.set(20, 20, 20);
    scene.add(pointLight);
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    camera.position.z = 40;

    // Animation Loop
    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.x += 0.005;
      mesh.rotation.y += 0.01;
      renderer.render(scene, camera);
    }

    // Handle Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();

    // --- GSAP ANIMATIONS ---
    gsap.to(".hero-title", {
        opacity: 1,
        y: -20,
        duration: 1.5,
        ease: "power4.out",
        delay: 0.5
    });
  </script>
</body>
</html>
