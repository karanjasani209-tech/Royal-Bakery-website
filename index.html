<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Bakery \u2014 Artisan Excellence</title>

  <!-- =====================================================
       ROYAL BAKERY \u2014 Premium Luxury Website
       Built with: Three.js, GSAP, ScrollTrigger, Vanilla JS
       Author: Senior Frontend Developer
       Version: 1.0 Production
  ===================================================== -->

  <!-- Google Fonts: Cormorant Garamond (luxury display) + Jost (clean body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <!-- Three.js CDN \u2014 3D rendering library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- GSAP CDN \u2014 High-performance animations (60fps+) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

  <style>
    /* =====================================================
       CSS CUSTOM PROPERTIES \u2014 Design Token System
       Modify these to instantly retheme the entire site
    ===================================================== */
    :root {
      --gold:        #C9A84C;
      --gold-light:  #E8C97A;
      --gold-dark:   #8B6914;
      --cream:       #FAF5EB;
      --cream-dark:  #F0E6CC;
      --charcoal:    #1A1612;
      --charcoal-mid:#2D2620;
      --charcoal-soft:#3D342C;
      --white:       #FFFFFF;
      --text-muted:  #8A7B6A;

      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Jost', sans-serif;

      --transition-slow:   0.8s cubic-bezier(0.16, 1, 0.3, 1);
      --transition-medium: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      --transition-fast:   0.2s ease;

      --shadow-gold: 0 0 60px rgba(201, 168, 76, 0.15);
      --shadow-deep: 0 40px 80px rgba(0,0,0,0.5);
    }

    /* =====================================================
       RESET & BASE STYLES
    ===================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: clamp(14px, 1.1vw, 18px); /* Fluid typography \u2014 4K optimized */
    }

    body {
      font-family: var(--font-body);
      background: var(--charcoal);
      color: var(--cream);
      overflow-x: hidden;
      cursor: none; /* Hidden \u2014 we use custom cursor */
    }

    /* =====================================================
       CUSTOM CURSOR \u2014 Luxury magnetic cursor
    ===================================================== */
    #cursor-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, background 0.3s ease, width 0.3s ease, height 0.3s ease;
      mix-blend-mode: difference;
    }

    #cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(201, 168, 76, 0.6);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%, -50%);
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
    }

    body.cursor-hover #cursor-dot   { width: 12px; height: 12px; }
    body.cursor-hover #cursor-ring  { width: 56px; height: 56px; opacity: 0.4; }

    /* =====================================================
       PAGE SYSTEM \u2014 Multi-page navigation
    ===================================================== */
    .page {
      display: none;
      min-height: 100vh;
      opacity: 0;
    }
    .page.active {
      display: block;
      animation: pageIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* =====================================================
       NAVIGATION
    ===================================================== */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.8rem 4rem;
      transition: background var(--transition-medium), backdrop-filter var(--transition-medium);
    }
    nav.scrolled {
      background: rgba(26, 22, 18, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(201, 168, 76, 0.12);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .nav-logo span { color: var(--cream); }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
      opacity: 0.75;
      transition: opacity var(--transition-fast), color var(--transition-fast);
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width var(--transition-medium);
    }
    .nav-links a:hover, .nav-links a.active-link { opacity: 1; color: var(--gold); }
    .nav-links a:hover::after, .nav-links a.active-link::after { width: 100%; }

    .nav-cta {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--charcoal);
      background: var(--gold);
      border: none;
      padding: 0.75rem 1.8rem;
      cursor: none;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }
    .nav-cta:hover { background: var(--gold-light); transform: translateY(-1px); }

    /* =====================================================
       \u2588\u2588\u2557  \u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2557   \u2588\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557
       \u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2550\u2550\u255d
       \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2551\u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2554\u2588\u2588\u2588\u2588\u2554\u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2557
       \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2551\u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2551\u255a\u2588\u2588\u2554\u255d\u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u255d
       \u2588\u2588\u2551  \u2588\u2588\u2551\u255a\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2551 \u255a\u2550\u255d \u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557
       PAGE \u2014 HOME
    ===================================================== */

    /* HERO SECTION */
    #hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Three.js canvas sits behind everything */
    #hero-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* Radial dark vignette over the canvas */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 70% at 50% 50%,
        transparent 0%,
        rgba(26,22,18,0.35) 60%,
        rgba(26,22,18,0.85) 100%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 2rem;
    }

    .hero-eyebrow {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      transform: translateY(20px);
      margin-bottom: 1.5rem;
      display: block;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 9vw, 9rem);
      font-weight: 300;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--cream);
      opacity: 0;
      transform: translateY(30px);
      margin-bottom: 1.5rem;
    }
    .hero-title em {
      font-style: italic;
      color: var(--gold);
      font-weight: 300;
    }

    .hero-subtitle {
      font-family: var(--font-body);
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      font-weight: 200;
      letter-spacing: 0.12em;
      color: var(--cream);
      opacity: 0;
      transform: translateY(20px);
      max-width: 460px;
      margin: 0 auto 3rem;
      line-height: 1.8;
    }

    .hero-actions {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      opacity: 0;
      transform: translateY(20px);
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      z-index: 10;
      opacity: 0;
    }
    .scroll-indicator span {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.6;
    }
    .scroll-line {
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50%       { opacity: 0.8; transform: scaleY(1.3); }
    }

    /* ---- HOME: PHILOSOPHY STRIP ---- */
    .philosophy-strip {
      background: var(--gold);
      padding: 1rem 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .marquee-inner {
      display: inline-flex;
      gap: 4rem;
      animation: marquee 25s linear infinite;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .marquee-item {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-style: italic;
      letter-spacing: 0.1em;
      color: var(--charcoal);
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .marquee-item::after {
      content: '\u2726';
      font-style: normal;
      font-size: 0.6rem;
    }

    /* ---- HOME: ABOUT / STORY ---- */
    .story-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 90vh;
      overflow: hidden;
    }
    .story-visual {
      position: relative;
      background: var(--charcoal-mid);
      overflow: hidden;
    }
    /* 3D model canvas in story panel */
    #story-canvas {
      width: 100%; height: 100%;
      display: block;
    }
    .story-text {
      padding: 8rem 5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--charcoal-mid);
      border-left: 1px solid rgba(201,168,76,0.1);
    }
    .section-label {
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .section-label::before {
      content: '';
      display: inline-block;
      width: 30px; height: 1px;
      background: var(--gold);
    }
    .story-heading {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 4vw, 4rem);
      font-weight: 300;
      line-height: 1.15;
      color: var(--cream);
      margin-bottom: 2rem;
    }
    .story-heading em { font-style: italic; color: var(--gold); }
    .story-body {
      font-size: 0.88rem;
      font-weight: 200;
      line-height: 2;
      color: var(--text-muted);
      max-width: 440px;
      margin-bottom: 2.5rem;
    }

    /* Stat row */
    .stat-row {
      display: flex;
      gap: 3rem;
      margin-top: 1rem;
    }
    .stat-item { border-left: 1px solid rgba(201,168,76,0.3); padding-left: 1.2rem; }
    .stat-number {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* ---- HOME: FEATURED ---- */
    .featured-section {
      padding: 8rem 4rem;
      text-align: center;
      background: var(--charcoal);
    }
    .section-title-center {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 5rem);
      font-weight: 300;
      color: var(--cream);
      margin-bottom: 1rem;
    }
    .section-title-center em { font-style: italic; color: var(--gold); }
    .section-sub {
      font-size: 0.82rem;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 5rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .featured-card {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      cursor: none;
      background: var(--charcoal-mid);
    }
    /* Simulated luxury product image using canvas gradient art */
    .featured-card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .featured-card:hover .featured-card-bg { transform: scale(1.08); }
    .featured-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(26,22,18,0.9) 0%, transparent 55%);
      transition: opacity var(--transition-medium);
    }
    .featured-card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2rem;
      transform: translateY(8px);
      transition: transform var(--transition-medium);
    }
    .featured-card:hover .featured-card-info { transform: translateY(0); }
    .card-tag {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .card-name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--cream);
      margin-bottom: 0.4rem;
    }
    .card-price {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    /* Hover zoom detail badge */
    .zoom-badge {
      position: absolute;
      top: 1.2rem; right: 1.2rem;
      width: 44px; height: 44px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      transition: opacity var(--transition-medium);
      backdrop-filter: blur(8px);
    }
    .featured-card:hover .zoom-badge { opacity: 1; }

    /* =====================================================
       PAGE \u2014 SERVICES
    ===================================================== */
    .services-hero {
      padding: 14rem 4rem 6rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .services-hero::before {
      content: 'SERVICES';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateY(-20px);
      font-family: var(--font-display);
      font-size: clamp(8rem, 20vw, 22rem);
      font-weight: 600;
      color: transparent;
      -webkit-text-stroke: 1px rgba(201,168,76,0.06);
      letter-spacing: -0.02em;
      pointer-events: none;
      white-space: nowrap;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      max-width: 1200px;
      margin: 0 auto 6rem;
      padding: 0 2rem;
      background: rgba(201,168,76,0.08);
    }
    .service-card {
      background: var(--charcoal);
      padding: 4rem;
      transition: background var(--transition-medium);
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 0;
      background: var(--gold);
      transition: height var(--transition-slow);
    }
    .service-card:hover::before { height: 100%; }
    .service-card:hover { background: var(--charcoal-mid); }

    .service-number {
      font-family: var(--font-display);
      font-size: 4rem;
      font-weight: 300;
      color: rgba(201,168,76,0.12);
      line-height: 1;
      margin-bottom: 1.5rem;
      transition: color var(--transition-medium);
    }
    .service-card:hover .service-number { color: rgba(201,168,76,0.3); }
    .service-icon {
      font-size: 1.8rem;
      margin-bottom: 1.2rem;
      display: block;
    }
    .service-name {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--cream);
      margin-bottom: 1rem;
    }
    .service-name em { font-style: italic; color: var(--gold); }
    .service-desc {
      font-size: 0.82rem;
      font-weight: 200;
      line-height: 1.9;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .service-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .service-features li {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .service-features li::before {
      content: '\u2014';
      color: var(--gold);
      font-size: 0.6rem;
    }

    /* Process timeline */
    .process-section {
      padding: 6rem 4rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .process-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      text-align: center;
      margin-bottom: 5rem;
      color: var(--cream);
    }
    .process-title em { font-style: italic; color: var(--gold); }

    .timeline {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 24px; top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--gold) 0%, rgba(201,168,76,0.1) 100%);
    }
    .timeline-item {
      display: flex;
      gap: 3rem;
      padding: 0 0 4rem 0;
      position: relative;
    }
    .timeline-dot {
      width: 48px; height: 48px;
      flex-shrink: 0;
      border-radius: 50%;
      background: var(--charcoal);
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.9rem;
      color: var(--gold);
      position: relative;
      z-index: 1;
    }
    .timeline-content { padding-top: 0.6rem; }
    .timeline-step {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .timeline-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--cream);
      margin-bottom: 0.5rem;
    }
    .timeline-desc {
      font-size: 0.8rem;
      font-weight: 200;
      line-height: 1.8;
      color: var(--text-muted);
    }

    /* =====================================================
       PAGE \u2014 MENU
    ===================================================== */
    .menu-hero {
      padding: 14rem 4rem 4rem;
      text-align: center;
    }

    /* Category filter tabs */
    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin: 3rem auto 5rem;
      max-width: 700px;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .cat-tab {
      flex: 1;
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-right: 1px solid rgba(201,168,76,0.2);
      padding: 1rem 0.5rem;
      cursor: none;
      transition: all var(--transition-medium);
